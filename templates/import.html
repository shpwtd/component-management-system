{% extends "base.html" %}
{% block content %}
<div class="page-header">
<h1>导入元器件</h1>
<a href="/download_template" class="btn btn-primary">下载 Excel 模板</a>
</div>
<div class="card">
<h2>上传 Excel 文件</h2>
<p class="text-muted mb-16">先下载模板填写数据，然后上传。模板第1行为说明（不可删除），第2行为表头，从第3行开始填写数据。货架名称填实际名称（如A、B），不加货架二字。不填货位信息则自动分配空货位。</p>
<form method="POST" enctype="multipart/form-data">
<div class="form-group">
<label>选择 Excel 文件 (.xlsx)</label>
<input type="file" name="file" class="form-control" accept=".xlsx" required>
</div>
<div class="form-actions">
<button type="submit" class="btn btn-primary">开始导入</button>
</div>
</form>
</div>
{% endblock %}
