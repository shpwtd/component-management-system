{% extends "base.html" %}
{% block content %}
<div class="page-header">
<h1>出库 — {{ comp.name }}</h1>
<a href="/components/{{ comp.id }}" class="btn btn-secondary">返回</a>
</div>
<div class="card" style="max-width:500px">
<div class="stat-card" style="margin-bottom:16px">
<div class="stat-value" style="font-size:28px">{{ comp.quantity }}</div>
<div class="stat-label">当前库存</div>
</div>
<form method="POST">
<div class="form-group">
<label>出库数量</label>
<input type="number" name="quantity" class="form-control" min="1" max="{{ comp.quantity }}" required placeholder="输入数量">
</div>
<div class="form-group">
<label>备注（可选）</label>
<input type="text" name="note" class="form-control" placeholder="如：维修领用">
</div>
<div class="form-actions">
<button type="submit" class="btn btn-warning">确认出库</button>
<a href="/components/{{ comp.id }}" class="btn btn-secondary">取消</a>
</div>
</form>
</div>
{% endblock %}
